<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Gen I – Pikachu</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --yellow:     #FFCC00;
      --cream:      #FFF3C4;
      --text-dark:  #1a1a1a;
    }

    html, body {
      min-height: 100%;
      font-family: 'Nunito', sans-serif;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Card ─── */
    .card {
      width: 900px;
      height: 520px;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      box-shadow: 0 30px 80px rgba(0,0,0,.5);
      position: relative;
      animation: cardIn .6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity:0; transform:translateY(30px) scale(.97); }
      to   { opacity:1; transform:none; }
    }

    /* ── Left yellow panel ── */
    .panel-left {
      flex: 0 0 56%;
      background: var(--yellow);
      position: relative;
      padding: 36px 44px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    /* Pokéball watermark */
    .pokeball-watermark {
      position: absolute;
      bottom: -80px;
      left: -80px;
      width: 280px;
      height: 280px;
      pointer-events: none;
      opacity: .08;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeDown .5s .1s both;
    }
    .logo-mark {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: #1a1a1a;
      border: 3px solid #fff;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }
    .logo-mark::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #1a1a1a;
    }
    .logo-mark::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: calc(50% - 1.5px);
      height: 3px;
      background: #1a1a1a;
    }
    .logo-text {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 26px;
      letter-spacing: 1px;
      color: var(--text-dark);
      text-shadow: 3px 3px 0 rgba(0,0,0,.12);
      -webkit-text-stroke: 1.5px #1a1a1a;
    }

    /* ── Main content ── */
    .content {
      animation: fadeDown .5s .25s both;
    }
    .gen-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(0,0,0,.55);
      margin-bottom: 6px;
    }
    .pokemon-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 82px;
      line-height: .9;
      color: var(--text-dark);
      letter-spacing: -2px;
      margin-bottom: 16px;
    }
    .pokemon-desc {
      font-size: 13.5px;
      line-height: 1.7;
      color: rgba(0,0,0,.7);
      max-width: 340px;
    }

    /* ── Counter ── */
    .counter {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
      animation: fadeUp .5s .5s both;
    }
    .counter-line {
      width: 32px; height: 2px;
      background: var(--text-dark);
    }

    /* ── Right panel ── */
    .panel-right {
      flex: 1;
      background: var(--cream);
      position: relative;
      overflow: hidden;
    }

    /* Hamburger */
    .hamburger {
      position: absolute;
      top: 28px; right: 28px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      z-index: 10;
      animation: fadeDown .4s .15s both;
    }
    .hamburger span {
      display: block;
      width: 26px; height: 2.5px;
      background: #1a1a1a;
      border-radius: 2px;
    }

    /* Pikachu image */
    .pika-wrap {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      animation: pikaIn .8s .3s cubic-bezier(.22,1,.36,1) both,
                 float 4s 1.2s ease-in-out infinite;
      filter: drop-shadow(0 20px 35px rgba(180,130,0,.4));
    }
    .pika-wrap img {
      width: 100%;
      display: block;
    }

    @keyframes pikaIn {
      from { transform:translateX(-50%) translateY(70px); opacity:0; }
      to   { transform:translateX(-50%) translateY(0);   opacity:1; }
    }
    @keyframes float {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-14px); }
    }

    /* Type badge */
    .type-badge {
      position: absolute;
      top: 28px; left: 22px;
      background: rgba(255,204,0,.75);
      border: 1.5px solid rgba(0,0,0,.1);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(0,0,0,.65);
      animation: fadeDown .4s .55s both;
    }

    /* Pagination dots */
    .dots {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeIn .6s .8s both;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #F0D060;
      border: 1.5px solid rgba(0,0,0,.2);
    }
    .dot.active {
      background: #1a1a1a;
      border-color: #1a1a1a;
      transform: scale(1.25);
    }

    @keyframes fadeDown {
      from { transform:translateY(-18px); opacity:0; }
      to   { transform:none; opacity:1; }
    }
    @keyframes fadeUp {
      from { transform:translateY(18px); opacity:0; }
      to   { transform:none; opacity:1; }
    }
    @keyframes fadeIn {
      from { opacity:0; } to { opacity:1; }
    }
  </style>
</head>

<div class="card">

  <!-- LEFT PANEL -->
  <div class="panel-left">

    <!-- Pokéball SVG watermark -->

    <!-- Logo -->
    <div class="logo">

    <div class="content">
